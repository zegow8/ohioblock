<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Block Ohio | Premium Puzzle Game</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="background-graphic"></div>
  
  <div class="container">
    <header>
      <div class="logo">
        <i class="fas fa-dice-d20"></i>
        <h1>BLOCK <span>OHIO</span></h1>
      </div>
      <div class="score-container">
        <div class="score-box">
          <div class="score-label">SCORE</div>
          <div id="score" class="score-value">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">HIGH SCORE</div>
          <div id="high-score" class="score-value">0</div>
        </div>
      </div>
    </header>
    
    <div class="main-content">
      <div class="game-area">
        <div class="grid-section">
          <h2>GAME BOARD <i class="fas fa-border-all"></i></h2>
          <div id="grid" class="game-grid"></div>
        </div>
      </div>
      
      <div class="side-panel">
        <div class="available-pieces">
          <h2>AVAILABLE BLOCKS <i class="fas fa-shapes"></i></h2>
          <div id="pieces" class="pieces-container"></div>
        </div>
        
        <div class="game-controls">
          <h2>CONTROLS <i class="fas fa-gamepad"></i></h2>
          <div class="game-buttons">
            <button id="hint-btn" class="btn">
              <i class="fas fa-lightbulb"></i> HINT
            </button>
            <button id="new-blocks-btn" class="btn">
              <i class="fas fa-sync"></i> NEW SHAPES
            </button>
            <button id="restart-btn" class="btn">
              <i class="fas fa-redo"></i> RESTART
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <div class="instructions">
      <p><i class="fas fa-mouse-pointer"></i> Drag and drop blocks to the grid</p>
      <p><i class="fas fa-gamepad"></i> Complete rows or columns to clear them</p>
      <p><i class="fas fa-broom"></i> Clear lines to earn points</p>
    </div>
  </div>
  
  <div id="game-over" class="game-over">
    <div class="game-over-content">
      <h2>GAME OVER</h2>
      <div class="final-score">Your score: <span id="final-score">0</span></div>
      <p>No more moves available</p>
      <div class="game-over-buttons">
        <button id="restart-btn-2" class="btn large">
          <i class="fas fa-redo"></i> RESTART
        </button>
        <button id="quit-btn" class="btn large">
          <i class="fas fa-door-open"></i> QUIT
        </button>
      </div>
    </div>
  </div>
  
  <audio id="place-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.mp3"></audio>
  <audio id="clear-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>
  <audio id="game-over-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-retro-arcade-game-over-470.mp3"></audio>
  
  <script src="script.js"></script>
</body>
</html>
